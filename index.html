    color: #e0e0e0;
    margin: 0 auto;
    padding: 20px;
    max-width: 900px;
  }
  .header {
    background: linear-gradient(135deg, #112D4E, #1a4270);
    border: 2px solid #C6A75E;
    border-radius: 12px;
    padding: 24px 32px;
    margin-bottom: 30px;
    text-align: center;
  }
  .header h1 { color: #C6A75E; font-size: 28px; margin: 0 0 6px 0; }
  .header p { color: #aaa; margin: 0; font-size: 14px; }

  .crm-section { margin-bottom: 32px; }
  .crm-section-title {
    font-size: 17px;
    font-weight: bold;
    padding: 12px 20px;
    border-radius: 10px 10px 0 0;
    border: 1px solid transparent;
  }
  .crm-section-title.new     { background: #C6A75E; color: #112D4E; border-color: #C6A75E; }
  .crm-section-title.gewonnen { background: #1a5c2a; color: #7fff9a; border-color: #2a8a40; }
  .crm-section-title.nicht   { background: #3a3a1a; color: #d4d47a; border-color: #5a5a2a; }
  .crm-section-title.verloren { background: #5c1a1a; color: #ff9a9a; border-color: #8a2a2a; }
  .count-badge {
    display: inline-block;
    background: rgba(0,0,0,0.25);
    border-radius: 12px;
    padding: 1px 10px;
    font-size: 13px;
    font-weight: bold;
    margin-left: 8px;
    vertical-align: middle;
  }

  .crm-section-body {
    background: #112D4E;
    border: 1px solid #1e4070;
    border-top: none;
    border-radius: 0 0 10px 10px;
    padding: 12px;
  }
  .crm-section-empty {
    color: #555;
    font-style: italic;
    padding: 8px 4px;
    font-size: 13px;
  }

  .lead-card {
    background: #0d1b2a;
    border: 1px solid #1e4070;
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .lead-card.new        { border-color: #2a5a8a; }
  .lead-card.gewonnen   { border-color: #2a8a40; }
  .lead-card.nicht-rangegangen { border-color: #5a5a2a; }
  .lead-card.verloren   { border-color: #8a2a2a; }

  .lead-mini {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }
  .lead-mini:hover { background: #1a2a3a; }
  .lead-mini-info { display: flex; flex-direction: column; gap: 2px; }
  .lead-mini-company { font-weight: bold; color: #C6A75E; font-size: 15px; }
  .lead-mini-owner { color: #aaa; font-size: 13px; }
  .lead-mini-right { display: flex; align-items: center; gap: 10px; }
  .lead-expand-icon { color: #555; font-size: 16px; transition: transform 0.2s; }
  .lead-expand-icon.open { transform: rotate(180deg); }

  .status-badge {
    font-size: 12px;
    font-weight: bold;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .status-badge.gewonnen         { background: #1a5c2a; color: #7fff9a; }
  .status-badge.nicht-rangegangen { background: #3a3a1a; color: #d4d47a; }
  .status-badge.verloren          { background: #5c1a1a; color: #ff9a9a; }

  .countdown-badge { font-size: 11px; color: #ff7070; font-weight: bold; }

  .lead-content {
    padding: 16px 20px;
    border-top: 1px solid #1e4070;
  }

  .status-buttons {
    display: flex;
    gap: 10px;
    margin: 18px 0 4px 0;
    flex-wrap: wrap;
  }
  .status-btn {
    padding: 8px 18px;
    border: 2px solid transparent;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .status-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .status-btn:active { transform: translateY(0); }
  .status-btn.gewonnen          { background: #2a8a40; color: #fff; }
  .status-btn.nicht-rangegangen { background: #5a5a2a; color: #d4d47a; }
  .status-btn.verloren          { background: #8a2a2a; color: #ffaaaa; }
  .status-btn.active            { border-color: #C6A75E; }

  .lead-content .rank-header {
    background: #1a3a5c;
    color: #C6A75E;
    font-weight: bold;
    font-size: 15px;
    padding: 10px 14px;
    border-radius: 6px;
    margin: 8px 0;
  }
  .lead-content .divider { border: none; border-top: 1px solid #1e4070; margin: 8px 0; }
  .lead-content .section-label { color: #C6A75E; font-weight: bold; margin-top: 12px; margin-bottom: 4px; }
  .lead-content .callscript {
    background: #0d2a40;
    border-left: 3px solid #C6A75E;
    padding: 10px 14px;
    border-radius: 4px;
    font-style: italic;
    color: #d0d0d0;
    margin: 6px 0;

    align-items: center;
    gap: 8px;
    background: #1a5c2a;
    color: #7fff9a;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 16px;
    font-weight: bold;
    text-decoration: none;
    cursor: pointer;
    margin: 10px 0 4px 0;
    width: 100%;
    justify-content: center;
  }

    .lead-mini-company { font-size: 14px; }
    .lead-mini-owner { font-size: 12px; }

    font-weight: bold;

    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;

    background: transparent;
    border: 2px solid #3a3a1a;
    border-radius: 8px;
    color: #a0a060;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;

    background: #2a2a08;
    border-color: #C6A75E;

  .lead-card.needs-review {

    box-shadow: 0 0 10px rgba(198,167,94,0.25);

  .review-badge {
    display: inline-block;
    background: #2a2a08;
    border: 1px solid #C6A75E;
    color: #C6A75E;
    font-size: 11px;
    font-weight: bold;

    .notes-textarea { font-size: 15px; min-height: 88px; }
    .review-btn { font-size: 14px; padding: 12px 14px; width: 100%; justify-content: center; }

  .sync-indicator {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 6px;

  }

  .sync-indicator.syncing  { color: #C6A75E; }
  .sync-indicator.saved    { color: #7fff9a; }
  .sync-indicator.error    { color: #ff9a9a; }
</style>

let _syncTimer = null;

function setSyncStatus(status) {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  const icons = { pending: '🔄 Speichern…', syncing: '☁️ Sync…', saved: '✅ Synced', error: '⚠️ Offline?' };
  el.textContent = icons[status] || '';
  el.className = 'sync-indicator ' + status;
}

function pushToCloud(state) {

  fetch(KVDB_URL, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(state)
  }).then(r => {

  }).catch(() => setSyncStatus('error'));
}

function schedulePush(state) {

  setSyncStatus('pending');
  _syncTimer = setTimeout(() => pushToCloud(state), 1500);
}

let _lastCloudJson = null;

async function fetchAndMerge(isPolling) {
  try {
    const r = await fetch(KVDB_URL + '?t=' + Date.now());
    if (!r.ok) { if (!isPolling) setSyncStatus('error'); return false; }
    const text = await r.text();
    if (!text || text === 'null' || !text.trim().startsWith('{')) return false;
    const cloudState = JSON.parse(text);
    const cloudJson = JSON.stringify(cloudState);
    if (cloudJson === _lastCloudJson) return false; // nichts geändert
    _lastCloudJson = cloudJson;
    const local = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const merged = Object.assign({}, local, cloudState);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
    setSyncStatus('saved');
    return true;
  } catch(e) {
    return false;
  }
}

  const changed = await fetchAndMerge(false);
  if (!changed) setSyncStatus('saved');
  render();
  setTimeout(startPolling, 5000);
}

async function startPolling() {
  const changed = await fetchAndMerge(true);
  if (changed) render();
  setTimeout(startPolling, 20000);
}

const timers = {};

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch(e) { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  schedulePush(state);
}

function getLeadState(state, id) {
  return state[id] || { status: null, expanded: false, verlorenAt: null, deleted: false };
}

function setStatus(leadId, newStatus) {
  const state = loadState();
  const ls = getLeadState(state, leadId);

  if (timers[leadId]) { clearTimeout(timers[leadId]); delete timers[leadId]; }

  ls.status = newStatus;
  ls.expanded = false;
  ls.deleted = false;

  if (newStatus === 'verloren') {
    ls.verlorenAt = Date.now();
    scheduleDelete(leadId, DELETE_DELAY_MS);
  } else {
    ls.verlorenAt = null;
  }

  state[leadId] = ls;
  saveState(state);
  render();
}

function scheduleDelete(leadId, delayMs) {
  if (timers[leadId]) clearTimeout(timers[leadId]);
  timers[leadId] = setTimeout(() => {
    const state = loadState();
    const ls = getLeadState(state, leadId);
    if (ls.status === 'verloren') {
      ls.deleted = true;
      state[leadId] = ls;
      saveState(state);
      render();
    }
    delete timers[leadId];
  }, delayMs);
}

function toggleExpanded(leadId) {
  const state = loadState();
  const ls = getLeadState(state, leadId);
  ls.expanded = !ls.expanded;
  state[leadId] = ls;
  saveState(state);
  render();
}

function formatCountdown(ms) {
  const totalSec = Math.max(0, Math.ceil(ms / 1000));
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  return min + ':' + String(sec).padStart(2, '0');
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function buildLeadCard(lead, ls, isNew) {
  const statusClass = ls.status || 'new';
  const expanded = isNew || ls.expanded;

  let miniHtml = '';
  if (!isNew) {
    const labels = {
      'gewonnen': '✅ Gewonnen',
      'nicht-rangegangen': '📵 Nicht rangegangen',
      'verloren': '❌ Verloren'
    };
    let countdownHtml = '';
    if (ls.status === 'verloren' && ls.verlorenAt) {
      const rem = ls.verlorenAt + DELETE_DELAY_MS - Date.now();
      countdownHtml = '<span class="countdown-badge" data-verloren-at="' + ls.verlorenAt + '">🗑 ' + formatCountdown(rem) + '</span>';
    }
    miniHtml =
      '<div class="lead-mini" onclick="toggleExpanded(\'' + esc(lead.id) + '\')">' +
        '<div class="lead-mini-info">' +
          '<div class="lead-mini-company">' + esc(lead.company) + '</div>' +
          '<div class="lead-mini-owner">' + esc(lead.owner) + '</div>' +
        '</div>' +
        '<div class="lead-mini-right">' +
          countdownHtml +
          '<span class="status-badge ' + statusClass + '">' + (labels[ls.status] || '') + '</span>' +
          '<span class="lead-expand-icon' + (ls.expanded ? ' open' : '') + '">▼</span>' +
        '</div>' +
      '</div>';
  }

  const contentStyle = (!isNew && !ls.expanded) ? ' style="display:none"' : '';

  const btn = (key, label, cls) =>
    '<button class="status-btn ' + cls + (ls.status === key ? ' active' : '') +
    '" onclick="setStatus(\'' + esc(lead.id) + '\',\'' + key + '\')">' + label + '</button>';

  const phoneMatch = lead.html.match(/📞\s*([\d\s\/\-\+]+)/);
  const callBtnHtml = phoneMatch
    ? '<a class="call-btn" href="tel:' + phoneMatch[1].replace(/[\s\/\-]/g,'') + '">📞 Jetzt anrufen – ' + phoneMatch[1].trim() + '</a>'
    : '';

  // E-Mail-Block nur für "Nicht rangegangen"-Leads generieren
  let emailBlockHtml = '';
  if (ls.status === 'nicht-rangegangen') {
    const email = generateEmail(lead);
    emailBlockHtml =
      '<div class="email-section">' +
        '<div class="email-section-label">✉️ Follow-up E-Mail</div>' +
        '<div class="email-subject" id="email-subject-' + esc(lead.id) + '">' + esc(email.subject) + '</div>' +
        '<div class="email-body" id="email-body-' + esc(lead.id) + '">' + esc(email.body) + '</div>' +
        '<button class="copy-email-btn" id="copy-btn-' + esc(lead.id) + '" onclick="copyEmail(\'' + esc(lead.id) + '\')">📋 E-Mail kopieren</button>' +
      '</div>';
  }

  const contentHtml =
    '<div class="lead-content" id="content-' + esc(lead.id) + '"' + contentStyle + '>' +
      callBtnHtml +
      lead.html +
      '<div class="status-buttons">' +
        btn('gewonnen',          '✅ Gewonnen',          'gewonnen') +
        btn('nicht-rangegangen', '📵 Nicht rangegangen', 'nicht-rangegangen') +
        btn('verloren',          '❌ Verloren',          'verloren') +
      '</div>' +
      emailBlockHtml +
    '</div>';

  // "Erneut prüfen"-Klasse nur bei neuen Leads mit aktiver Markierung
  const reviewClass = (isNew && ls.needsReview) ? ' needs-review' : '';

  // Anmerkungen-Block: nur sichtbar bei neuen Leads
  let notesBlockHtml = '';
  if (isNew) {
    const savedNotes  = (ls.notes || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const reviewActive = ls.needsReview || false;
    notesBlockHtml = [
      '<div class="notes-section">',
      '<div class="notes-section-label">📝 Anmerkungen</div>',
      '<textarea class="notes-textarea" id="notes-' + esc(lead.id) + '"',
      ' placeholder="Notizen, Korrekturen, Website-Links …"',
      ' oninput="saveNote(\'' + esc(lead.id) + '\', this.value)">',
      savedNotes,
      '</textarea>',
      '<button class="review-btn' + (reviewActive ? ' active' : '') + '"',
      ' onclick="toggleReview(\'' + esc(lead.id) + '\')">',
      reviewActive ? '🔔 Erneut prüfen – markiert' : '🔔 Lead erneut prüfen',
      '</button>',
      '</div>'
    ].join('');
  }

  return '<div class="lead-card ' + statusClass + reviewClass + '" id="card-' + esc(lead.id) + '">' + miniHtml + contentHtml + notesBlockHtml + '</div>';
}

function buildSection(titleHtml, cssClass, cardsHtml) {
  const body = cardsHtml.trim()
    ? cardsHtml
    : '<div class="crm-section-empty">Keine Leads</div>';
  return '<div class="crm-section-title ' + cssClass + '">' + titleHtml + '</div>' +
         '<div class="crm-section-body">' + body + '</div>';
}

function render() {
  const state = loadState();
  let newCards = '', gewCards = '', nichtCards = '', verlCards = '';
  let newCount = 0, gewCount = 0, nichtCount = 0, verlCount = 0, reviewCount = 0;

  for (const lead of LEADS) {
    const ls = getLeadState(state, lead.id);
    if (ls.deleted) continue;
    if      (ls.status === null)                {
      newCards += buildLeadCard(lead, ls, true);
      newCount++;
      if (ls.needsReview) reviewCount++;
    }
    else if (ls.status === 'gewonnen')          { gewCards   += buildLeadCard(lead, ls, false); gewCount++;   }
    else if (ls.status === 'nicht-rangegangen') { nichtCards += buildLeadCard(lead, ls, false); nichtCount++; }
    else if (ls.status === 'verloren')          { verlCards  += buildLeadCard(lead, ls, false); verlCount++;  }
  }

  document.getElementById('section-new').innerHTML =
    buildSection(
      '📋 Neue Leads <span class="count-badge">' + newCount + '</span>' +
      (reviewCount > 0 ? '<span class="review-badge">🔔 ' + reviewCount + ' zu prüfen</span>' : ''),
      'new', newCards
    );
  document.getElementById('section-gewonnen').innerHTML =
    buildSection('✅ Gewonnen <span class="count-badge">' + gewCount + '</span>', 'gewonnen', gewCards);
  document.getElementById('section-nicht').innerHTML =
    buildSection('📵 Nicht rangegangen <span class="count-badge">' + nichtCount + '</span>', 'nicht', nichtCards);
  document.getElementById('section-verloren').innerHTML =
    buildSection('❌ Verloren <span class="count-badge">' + verlCount + '</span>', 'verloren', verlCards);

  // Restore timers for verloren leads after page reload
  for (const lead of LEADS) {
    const ls = getLeadState(state, lead.id);
    if (ls.status === 'verloren' && !ls.deleted && ls.verlorenAt && !timers[lead.id]) {
      const remaining = ls.verlorenAt + DELETE_DELAY_MS - Date.now();
      if (remaining > 0) {
        scheduleDelete(lead.id, remaining);
      } else {
        ls.deleted = true;
        state[lead.id] = ls;
        saveState(state);
      }
    }
  }

  startCountdownClock();
}

let clockInterval = null;
function startCountdownClock() {
  if (clockInterval) clearInterval(clockInterval);
  clockInterval = setInterval(() => {
    const badges = document.querySelectorAll('.countdown-badge');
    if (!badges.length) { clearInterval(clockInterval); return; }
    badges.forEach(el => {
      const verlorenAt = parseInt(el.dataset.verlorenAt, 10);
      const rem = verlorenAt + DELETE_DELAY_MS - Date.now();
      el.textContent = '🗑 ' + formatCountdown(rem);
    });
  }, 1000);
}



// Speichert die Anmerkung eines Leads in localStorage (kein Re-Render nötig)
function saveNote(leadId, text) {
  const state = loadState();
  const ls = getLeadState(state, leadId);
  ls.notes = text;
  state[leadId] = ls;
  saveState(state);
}

// Schaltet die "Erneut prüfen"-Markierung um und aktualisiert die Ansicht
function toggleReview(leadId) {
  const state = loadState();
  const ls = getLeadState(state, leadId);
  ls.needsReview = !ls.needsReview;
  state[leadId] = ls;
  saveState(state);
  render();
}

// Extrahiert den reinen Vornamen/Namen aus dem owner-Feld ("Max Müller (Inhaber)" → "Max Müller")
function extractOwnerName(ownerStr) {
  if (!ownerStr) return null;
  const m = ownerStr.match(/^([^(]+)/);
  return m ? m[1].trim() : ownerStr.trim();
}

// Extrahiert Text nach einem Emoji-Marker aus dem Lead-HTML
function extractFromHtml(leadHtml, emoji) {
  const regex = new RegExp(emoji + '\\s*([^<]+)');
  const m = leadHtml.match(regex);
  return m ? m[1].trim() : null;
}

// Generiert den Follow-up-E-Mail-Text auf Basis der Lead-Daten
function generateEmail(lead) {
  const ownerFull = extractOwnerName(lead.owner);
  const greeting  = ownerFull ? 'Hallo ' + ownerFull.split(' ')[0] : 'Hallo';
  const company   = lead.company || '';

  const websiteRaw = extractFromHtml(lead.html, '🌐');
  const branche    = extractFromHtml(lead.html, '🏷️')?.replace('Branche:', '').trim() || '';

  // Problem-spezifischer Satz
  let problemSatz = 'Ihre Online-Präsenz lässt sich gezielt verbessern, um mehr Anfragen zu gewinnen.';
  if (websiteRaw) {
    const wl = websiteRaw.toLowerCase();
    if (wl.includes('keine website') || wl.includes('keine eigene') || wl.includes('keinerlei'))
      problemSatz = 'Mir ist aufgefallen, dass ' + company + ' aktuell keine eigene Website hat – das bedeutet, potenzielle Kunden finden Sie online schlicht nicht.';
    else if (wl.includes('offline') || wl.includes('nicht erreichbar'))
      problemSatz = 'Ich habe festgestellt, dass Ihre Website gerade offline ist – das kostet täglich potenzielle Neukunden.';
    else if (wl.includes('ssl') || wl.includes('sicherheitswarnung'))
      problemSatz = 'Beim Aufruf Ihrer Website erscheint im Browser eine Sicherheitswarnung – das schreckt viele Besucher sofort ab.';
    else if (wl.includes('veraltet') || wl.includes('mobil') || wl.includes('2000') || wl.includes('http://'))
      problemSatz = 'Ihre Website wirkt optisch veraltet und ist auf dem Smartphone kaum nutzbar – das kostet aktiv Neukunden.';
  }

  const brancheSatz = branche
    ? 'Als ' + branche + ' wissen Sie: Neukunden informieren sich heute zuerst online, bevor sie anrufen.'
    : 'Neukunden informieren sich heute zuerst online, bevor sie anrufen.';

  const subject = 'Kurze Rückmeldung zu Ihrer Online-Präsenz – ' + company;

  const body =
    greeting + ',\n\n' +
    'ich habe heute versucht, Sie telefonisch zu erreichen – leider ohne Erfolg.\n\n' +
    problemSatz + '\n\n' +
    brancheSatz + ' Ich helfe Unternehmen dabei, professioneller online aufzutreten, besser gefunden zu werden und aus Besuchern echte Kundenanfragen zu machen.\n\n' +
    'Falls das für Sie interessant klingt, würde ich mich über eine kurze Rückmeldung freuen – ein 5-minütiges Gespräch reicht völlig aus.\n\n' +
    'Viele Grüße\n' +
    'Niclas Schwiering\n' +
    'LivelyVision – Webdesign & SEO\n' +
    'niclas@schwiering.com';

  return { subject, body };
}

// Kopiert Betreff + E-Mail-Text in die Zwischenablage und zeigt Feedback
function copyEmail(leadId) {
  const subjectEl = document.getElementById('email-subject-' + leadId);
  const bodyEl    = document.getElementById('email-body-'    + leadId);
  const btn       = document.getElementById('copy-btn-'      + leadId);
  if (!subjectEl || !bodyEl || !btn) return;

  const fullText = 'Betreff: ' + subjectEl.textContent + '\n\n' + bodyEl.textContent;
  navigator.clipboard.writeText(fullText).then(() => {
    btn.textContent = '✅ E-Mail kopiert';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 E-Mail kopieren';
      btn.classList.remove('copied');
    }, 2200);
  }).catch(() => {
    // Fallback für ältere Browser
    const ta = document.createElement('textarea');
    ta.value = fullText;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✅ E-Mail kopiert';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 E-Mail kopieren'; btn.classList.remove('copied'); }, 2200);
  });
}
